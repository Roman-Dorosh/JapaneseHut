<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Person · reliquia</title>
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@300;400;500;600;700&display=swap"
          rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: #0e0f12;
            font-family: 'Cormorant Garamond', 'Times New Roman', serif;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2rem 1.5rem;
            position: relative;
            color: #fffaf0;
        }

        body::before {
            content: '';
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-image: radial-gradient(circle at 15% 85%, rgba(180, 145, 110, 0.08) 0%, transparent 35%),
            radial-gradient(circle at 80% 20%, rgba(200, 170, 130, 0.05) 0%, transparent 40%),
            repeating-linear-gradient(45deg, rgba(255, 245, 230, 0.01) 0px, rgba(255, 245, 230, 0.01) 1px, transparent 1px, transparent 8px);
            pointer-events: none;
        }

        .frame {
            max-width: 1000px;
            width: 100%;
            position: relative;
            z-index: 20;
        }

        .sanctum {
            background: rgba(18, 20, 24, 0.75);
            backdrop-filter: blur(18px);
            -webkit-backdrop-filter: blur(18px);
            border-radius: 48px 16px 48px 16px;
            border: 1px solid rgba(230, 210, 180, 0.25);
            box-shadow: 0 40px 70px -30px rgba(0, 0, 0, 0.9), 0 0 0 1px rgba(230, 200, 160, 0.1) inset;
            padding: 4rem 3.5rem;
            transition: all 0.5s ease;
        }

        @media (max-width: 768px) {
            .sanctum {
                padding: 3rem 2rem;
            }
        }

        .seal {
            display: flex;
            flex-direction: column;
            align-items: center;
            margin-bottom: 2.5rem;
            position: relative;
        }

        .seal-decoration {
            display: flex;
            gap: 1.2rem;
            align-items: center;
            margin-bottom: 1rem;
        }

        .seal-decoration i {
            color: #cbb99b;
            font-size: 1.1rem;
            opacity: 0.7;
        }

        .seal-line {
            width: 70px;
            height: 1px;
            background: linear-gradient(90deg, transparent, #cbb99b, #e5d5b0, #cbb99b, transparent);
        }

        h2 {
            font-size: 4.8rem;
            font-weight: 400;
            letter-spacing: 0.1em;
            text-transform: uppercase;
            color: #f3ecd9;
            font-family: 'Cormorant Garamond', serif;
            line-height: 1;
            text-shadow: 2px 2px 0 rgba(0, 0, 0, 0.3), 4px 6px 15px rgba(0, 0, 0, 0.6);
            margin-bottom: 0.5rem;
            word-spacing: 0.2em;
            text-align: center;
        }

        .subtle-crown {
            color: #d8c5a5;
            font-size: 1rem;
            letter-spacing: 0.6em;
            margin-top: 0.2rem;
            opacity: 0.65;
            font-weight: 300;
        }

        .divine {
            display: flex;
            align-items: center;
            gap: 1.8rem;
            margin: 2.5rem 0 3.5rem 0;
        }

        .divine .line {
            flex: 1;
            height: 1px;
            background: linear-gradient(90deg, transparent, rgba(205, 175, 130, 0.4), rgba(230, 200, 150, 0.7), rgba(205, 175, 130, 0.4), transparent);
        }

        .divine i {
            color: #baa585;
            font-size: 1.4rem;
            opacity: 0.7;
        }

        .reliquary-container {
            display: flex;
            flex-direction: column;
            gap: 2rem;
            margin-bottom: 3rem;
        }

        .reliquary-item {
            display: flex;
            align-items: flex-start;
            background: rgba(25, 28, 32, 0.5);
            border: 1px solid rgba(210, 180, 140, 0.2);
            border-radius: 24px 8px 24px 8px;
            padding: 1.8rem 2rem;
            backdrop-filter: blur(4px);
            transition: all 0.3s ease;
            position: relative;
            overflow: hidden;
        }

        .reliquary-item::before {
            content: '';
            position: absolute;
            left: 0;
            top: 0;
            height: 100%;
            width: 6px;
            background: linear-gradient(180deg, #b59d7a, #8f826b, #b59d7a);
            opacity: 0.5;
        }

        .reliquary-item:hover {
            background: rgba(35, 40, 48, 0.8);
            border-color: rgba(220, 190, 140, 0.4);
            transform: translateX(6px);
            box-shadow: 0 15px 25px -18px black;
        }

        .reliquary-icon {
            font-size: 2.2rem;
            color: #dac29e;
            min-width: 70px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .reliquary-content {
            flex: 1;
            display: flex;
            flex-direction: column;
            gap: 0.3rem;
        }

        .reliquary-label {
            font-size: 1.3rem;
            letter-spacing: 0.15em;
            color: #b59d7a;
            text-transform: uppercase;
            font-weight: 300;
        }

        .reliquary-value {
            font-size: 2.2rem;
            font-weight: 400;
            color: #f0e2cf;
            font-family: 'Cormorant Garamond', serif;
            line-height: 1.2;
            word-break: break-word;
        }

        .section-title {
            display: flex;
            align-items: center;
            gap: 1.2rem;
            margin: 3rem 0 2rem 0;
        }

        .section-title .line {
            flex: 1;
            height: 1px;
            background: linear-gradient(90deg, transparent, rgba(205, 175, 130, 0.3), rgba(230, 200, 150, 0.5), rgba(205, 175, 130, 0.3), transparent);
        }

        .section-title i {
            color: #baa585;
            font-size: 1.6rem;
            opacity: 0.8;
        }

        .section-title span {
            font-size: 2.2rem;
            letter-spacing: 0.15em;
            color: #d8c9b5;
            text-transform: uppercase;
            font-weight: 400;
        }

        .catalogue {
            display: flex;
            flex-direction: column;
            gap: 1rem;
            margin-bottom: 2rem;
            max-height: 300px;
            overflow-y: auto;
            padding-right: 0.8rem;
            scrollbar-width: thin;
            scrollbar-color: #b59d7a #1e2126;
        }

        .catalogue::-webkit-scrollbar {
            width: 6px;
        }

        .catalogue::-webkit-scrollbar-track {
            background: rgba(30, 33, 38, 0.5);
            border-radius: 10px;
        }

        .catalogue::-webkit-scrollbar-thumb {
            background: #8f826b;
            border-radius: 10px;
            border: 1px solid rgba(200, 170, 130, 0.2);
        }

        .entry {
            display: flex;
            align-items: center;
            background: rgba(25, 28, 32, 0.5);
            border: 1px solid rgba(210, 180, 140, 0.15);
            border-radius: 16px;
            transition: all 0.3s cubic-bezier(0.2, 0.9, 0.4, 1);
            text-decoration: none;
            color: #f2e6d5;
            backdrop-filter: blur(4px);
            position: relative;
            overflow: hidden;
        }

        .entry::before {
            content: '';
            position: absolute;
            left: 0;
            top: 0;
            height: 100%;
            width: 8px;
            background: linear-gradient(180deg, #b59d7a, #8f826b, #b59d7a);
            opacity: 0.5;
        }

        .entry:hover {
            background: rgba(35, 40, 48, 0.8);
            border-color: rgba(220, 190, 140, 0.4);
            transform: translateX(6px);
            box-shadow: 0 10px 20px -15px black;
        }

        .entry-icon {
            padding: 1.2rem 1.2rem 1.2rem 2rem;
            font-size: 1.8rem;
            color: #dac29e;
            display: flex;
            align-items: center;
            justify-content: center;
            min-width: 70px;
        }

        .entry-content {
            flex: 1;
            padding: 1.2rem 1rem;
            font-size: 1.8rem;
            font-weight: 400;
            letter-spacing: 0.04em;
            color: #f0e2cf;
            font-family: 'Cormorant Garamond', serif;
            border-left: 1px dashed rgba(205, 175, 130, 0.3);
            padding-left: 1.8rem;
            text-decoration: none;
        }

        .entry a {
            display: flex;
            align-items: center;
            width: 100%;
            text-decoration: none;
            color: inherit;
        }

        .empty-message {
            text-align: center;
            padding: 2.5rem 2rem;
            border: 1px dashed rgba(200, 170, 130, 0.3);
            border-radius: 32px 8px 32px 8px;
            color: #b59d7a;
            font-size: 1.6rem;
            letter-spacing: 0.1em;
            background: rgba(20, 22, 26, 0.4);
            backdrop-filter: blur(4px);
            margin-bottom: 2rem;
        }

        .empty-message i {
            display: block;
            font-size: 2.2rem;
            margin-bottom: 1rem;
            color: #8f826b;
        }

        .actions {
            display: flex;
            flex-wrap: wrap;
            gap: 2rem;
            justify-content: space-between;
            align-items: center;
            margin-top: 2rem;
            border-top: 1px solid rgba(200, 170, 130, 0.2);
            padding-top: 2.5rem;
        }

        .sacred-button {
            display: inline-flex;
            align-items: center;
            gap: 1rem;
            padding: 0.9rem 2.2rem;
            background: rgba(25, 28, 32, 0.7);
            border: 1px solid rgba(210, 180, 140, 0.35);
            border-radius: 40px 8px 40px 8px;
            color: #f0e2cf;
            text-decoration: none;
            font-size: 1.6rem;
            font-weight: 400;
            letter-spacing: 0.1em;
            transition: all 0.4s ease;
            backdrop-filter: blur(4px);
            box-shadow: 0 10px 20px -15px black;
            font-family: 'Cormorant Garamond', serif;
            text-transform: uppercase;
        }

        .sacred-button i {
            color: #dac29e;
            font-size: 1.3rem;
            transition: transform 0.3s ease;
        }

        .sacred-button:hover {
            background: rgba(40, 45, 55, 0.9);
            border-color: rgba(230, 200, 150, 0.6);
            transform: translateY(-3px);
            box-shadow: 0 20px 30px -20px black, 0 0 0 1px rgba(230, 205, 150, 0.1) inset;
        }

        .sacred-button:hover i {
            transform: scale(1.2);
            color: #ecdbba;
        }

        .buy-button {
            background: rgba(30, 45, 40, 0.7);
            border-color: rgba(100, 160, 140, 0.4);
        }

        .buy-button i {
            color: #8fc9b5;
        }

        .buy-button:hover {
            background: rgba(40, 65, 55, 0.9);
            border-color: rgba(80, 200, 170, 0.6);
        }

        .edit-button {
            background: rgba(35, 40, 48, 0.8);
            border-color: rgba(200, 170, 130, 0.45);
        }

        .back-button {
            border-color: rgba(160, 140, 110, 0.25);
            color: #d8c9b5;
        }

        .eternity {
            display: flex;
            justify-content: center;
            margin-top: 3.5rem;
            color: #7a6e5c;
            font-size: 1rem;
            letter-spacing: 0.8rem;
            opacity: 0.4;
            border-top: 1px solid rgba(200, 170, 130, 0.1);
            padding-top: 1.8rem;
        }

        .eternity i {
            font-size: 1.1rem;
            color: #8f826b;
        }

        hr {
            display: none;
        }

        .appear {
            animation: emerge 1.2s ease;
        }

        @keyframes emerge {
            0% {
                opacity: 0;
                transform: scale(0.98);
            }
            100% {
                opacity: 1;
                transform: scale(1);
            }
        }
    </style>
</head>
<body>
<div class="frame appear">
    <div class="sanctum">

        <div class="seal">
            <div class="seal-decoration">
                <span class="seal-line"></span>
                <i class="fas fa-asterisk"></i>
                <span class="seal-line"></span>
            </div>
            <h2>Information<br>About A Person</h2>
            <div class="subtle-crown">
                <i class="fas fa-crown"></i> <i class="fas fa-user"></i> <i class="fas fa-crown"></i>
            </div>
        </div>

        <div class="divine">
            <span class="line"></span>
            <i class="fas fa-infinity"></i>
            <span class="line"></span>
        </div>

        <!-- Информация о человеке -->
        <div class="reliquary-container">

            <div class="reliquary-item">
                <div class="reliquary-icon">
                    <i class="fas fa-user"></i>
                </div>
                <div class="reliquary-content">
                    <span class="reliquary-label">NAME</span>
                    <span class="reliquary-value" th:text="${modelGetPerson.getName()}">Ayrton</span>
                </div>
            </div>

            <div class="reliquary-item">
                <div class="reliquary-icon">
                    <i class="fas fa-user-tag"></i>
                </div>
                <div class="reliquary-content">
                    <span class="reliquary-label">SURNAME</span>
                    <span class="reliquary-value" th:text="${modelGetPerson.getSurname()}">Senna</span>
                </div>
            </div>

            <div class="reliquary-item">
                <div class="reliquary-icon">
                    <i class="fas fa-hourglass-half"></i>
                </div>
                <div class="reliquary-content">
                    <span class="reliquary-label">AGE</span>
                    <span class="reliquary-value" th:text="${modelGetPerson.getAge()}">34</span>
                </div>
            </div>
        </div>

        <!-- Кнопка Edit -->
        <div style="display: flex; justify-content: center; margin-bottom: 2rem;">
            <a th:href="@{/person/{person_id}/edit(person_id = ${modelGetPerson.getPerson_id()})}"
               class="sacred-button edit-button">
                <i class="fas fa-pen"></i>
                <span>Edit</span>
            </a>
        </div>

        <!-- Заголовок Purchased cars -->
        <div class="section-title">
            <span class="line"></span>
            <i class="fas fa-car-side"></i>
            <span>Purchased cars</span>
            <span class="line"></span>
        </div>

        <!-- Список купленных автомобилей -->
        <div class="catalogue" th:if="${not #lists.isEmpty(modelListCars)}">
            <div th:each="listCar : ${modelListCars}" class="entry">
                <a th:href="@{/car/{car_id}/{person_id}/sellCar(car_id = ${listCar.getCar_id()}, person_id = ${modelGetPerson.getPerson_id()})}">
                        <span class="entry-icon">
                            <i class="fas fa-car-side"></i>
                        </span>
                    <span class="entry-content" th:text="${listCar.getModel()}">Toyota Chaser</span>
                </a>
            </div>
        </div>

        <div th:if="${#lists.isEmpty(modelListCars)}" class="empty-message">
            <i class="fas fa-car"></i>
            <div>nulla carmina</div>
            <div style="font-size: 1rem; margin-top: 1rem; opacity: 0.7;">нет приобретённых автомобилей</div>
        </div>

        <!-- Кнопка Buy Car -->
        <div style="display: flex; justify-content: center; margin-top: 1rem;">
            <a th:href="@{/person/{person_id}/buyCar(person_id = ${modelGetPerson.getPerson_id()})}"
               class="sacred-button buy-button">
                <i class="fas fa-plus-circle"></i>
                <span>Buy Car</span>
            </a>
        </div>

        <div class="actions">
            <a href="/person" class="sacred-button back-button">
                <i class="fas fa-arrow-left"></i>
                <span>Back</span>
            </a>
        </div>

        <div class="eternity">
            <i class="fas fa-circle"></i> <i class="fas fa-infinity"></i> <i class="fas fa-circle"></i>
        </div>
    </div>
</div>
</body>
</html>
